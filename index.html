<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Shop | Viber Edition</title>
    <style>
        /* Модерен дизайн с анимации */
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; text-align: center; }
        header { padding: 60px 20px; background: linear-gradient(135deg, #7349ac 0%, #4b2c7d 100%); clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; text-transform: uppercase; animation: fadeInDown 1s; }
        .tagline { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px 20px; max-width: 1200px; margin: auto; }

        /* Карта на продукта - "Живата" част */
        .card { background: #161616; border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: 0.4s ease; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: #7349ac; box-shadow: 0 10px 30px rgba(115, 73, 172, 0.3); }
        .card img { width: 100%; height: 400px; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }

        .info { padding: 25px; }
        .brand { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .price { font-size: 1.8rem; color: #7349ac; font-weight: 800; margin-bottom: 20px; }

        /* Viber Бутон */
        .viber-btn { background: #7349ac; color: white; padding: 15px; text-decoration: none; display: block; border-radius: 12px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .viber-btn:hover { background: #5e3b8e; transform: scale(1.05); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>KAI SHOP</h1>
    <p class="tagline">PREMIUM QUALITY • ALL 30€ • VIBER ORDER</p>
</header>

<div class="container">
    <div class="card">
        <img src="74bff8974db24a20b3f50789ed64ed6f.png"> 
        <div class="info">
            <div class="brand">Kenzo Tiger</div>
            <div class="price">30€</div>
            <a href="viber://chat?number=359886622048" class="viber-btn">ПОРЪЧАЙ В VIBER</a>
        </div>
    </div>

    <div class="card">
        <img src=78c5f865c6df44e2bc3f43d91066fccc.png"> 
        <div class="info">
            <div class="brand">Gucci White</div>
            <div class="price">30€</div>
            <a href="viber://chat?number=359886622048" class="viber-btn">ПОРЪЧАЙ В VIBER</a>
        </div>
    </div>

    <div class="card">
        <img src=74bff8974db24a20b3f50789ed64ed6f.png"> 
        <div class="info">
            <div class="brand">Luxury Item</div>
            <div class="price">30€</div>
            <a href="viber://chat?number=359886622048" class="viber-btn">ПОРЪЧАЙ В VIBER</a>
        </div>
    </div>
    
    </div>

<footer>
    <p style="color: #444; padding: 40px;">© 2026 KAI SHOP. Бърза доставка.</p>
</footer>

</body>
</html>
