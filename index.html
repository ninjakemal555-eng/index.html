<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Shop | Premium Tees</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        header { background: #000; color: #fff; padding: 2rem; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 280px; margin: 15px; }
        .product-card img { width: 100%; border-radius: 5px; height: 200px; object-fit: cover; background: #eee; }
        .price { font-size: 24px; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        .btn { background: #000; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <h1>KAI SHOP</h1>
    <p>Всички тениски са на фиксирана цена от 30€</p>
</header>

<div class="container">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400" alt="Тениска 1">
        <h3>Kai Classic Black</h3>
        <p class="price">30€</p>
        <a href="https://wa.me/359123456789" class="btn">Поръчай по WhatsApp</a>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400" alt="Тениска 2">
        <h3>Kai Edition White</h3>
        <p class="price">30€</p>
        <a href="https://wa.me/359123456789" class="btn">Поръчай по WhatsApp</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 Kai Shop. Доставка в цяла Европа.</p>
</footer>

</body>
</html>
