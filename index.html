<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI SHOP | Premium Clothing</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-dark: #0b0b0b;
            --accent-purple: #b500b5;
            --accent-blue: #00bfff;
            --text-light: #ffffff;
            --text-gray: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* НАВИГАЦИЯ */
        header {
            background-color: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #1a1a1a;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .logo-img {
            height: 40px;
            width: 40px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid var(--accent-blue);
        }

        .brand-text {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
