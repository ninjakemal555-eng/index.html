<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI SHOP | Premium Clothing</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-dark: #0b0b0b;
            --accent-purple: #b500b5;
            --accent-blue: #00bfff;
            --text-light: #ffffff;
            --text-gray: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* НАВИГАЦИЯ */
        header {
            background-color: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #1a1a1a;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .logo-img {
            height: 40px;
            width: 40px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid var(--accent-blue);
        }

        .brand-text {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .brand-text span.purple { color: var(--accent-purple); }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
            text-shadow: 0 0 10px var(--accent-blue);
        }

        /* ХЕРО БАНЕР */
        .hero {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            background: radial-gradient(circle, rgba(181,0,181,0.2) 0%, rgba(0,0,0,1) 80%);
            margin-top: 70px;
            padding: 20px;
        }

        .hero-logo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.5);
            border: 2px solid var(--accent-purple);
        }

        .hero-content h1 {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .btn-shop {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            color: #fff;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.4);
            transition: 0.3s;
        }

        .btn-shop:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(181, 0, 181, 0.8);
        }

        /* КАТАЛОГ С ПРОДУКТИ */
        .shop-section {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
